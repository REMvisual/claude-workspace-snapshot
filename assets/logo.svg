<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Terminal window body -->
  <rect x="12" y="20" width="104" height="88" rx="8" ry="8" fill="#1E1E2E"/>

  <!-- Terminal title bar -->
  <rect x="12" y="20" width="104" height="22" rx="8" ry="8" fill="#2A2A3E"/>
  <rect x="12" y="34" width="104" height="8" fill="#2A2A3E"/>

  <!-- Tabs -->
  <rect x="18" y="25" width="20" height="12" rx="3" ry="3" fill="#4A9BD9"/>
  <rect x="42" y="25" width="20" height="12" rx="3" ry="3" fill="#9B59B6"/>
  <rect x="66" y="25" width="20" height="12" rx="3" ry="3" fill="#2ECC71"/>
  <rect x="90" y="25" width="20" height="12" rx="3" ry="3" fill="#E67E22"/>

  <!-- Terminal content lines (subtle) -->
  <rect x="22" y="52" width="42" height="3" rx="1.5" fill="#4A9BD9" opacity="0.3"/>
  <rect x="22" y="60" width="56" height="3" rx="1.5" fill="#9B59B6" opacity="0.25"/>
  <rect x="22" y="68" width="34" height="3" rx="1.5" fill="#2ECC71" opacity="0.2"/>
  <rect x="22" y="76" width="48" height="3" rx="1.5" fill="#E67E22" opacity="0.25"/>
  <rect x="22" y="84" width="30" height="3" rx="1.5" fill="#4A9BD9" opacity="0.2"/>

  <!-- Circular restore arrow (bottom-right overlay) -->
  <circle cx="96" cy="88" r="22" fill="#0D1117" opacity="0.85"/>
  <path d="M96 72 A16 16 0 1 1 80 88" fill="none" stroke="#4A9BD9" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="82,80 80,89 89,87" fill="#4A9BD9"/>
